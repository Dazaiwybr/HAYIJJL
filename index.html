<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🍩Simpsons Cara a Cara - Springfield Edition</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        /* Importando fontes e a Akbar (Réplica perfeita do logotipo dos Simpsons) */
        @import url('https://fonts.googleapis.com/css2?family=Hachi+Maru+Pop&family=Sniglet:wght=800&display=swap');
        @import url('https://fonts.cdnfonts.com/css/akbar');

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Sniglet', 'Comic Sans MS', cursive;
            background: #5c9ced; /* Azul do céu de Springfield */
            background-image: radial-gradient(rgba(255,255,255,0.3) 15%, transparent 16%);
            background-size: 30px 30px;
            min-height: 100vh;
            color: #3d2100;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }
        
        /* ==================== ANIMAÇÕES DA INTRO CLÁSSICA ==================== */
        @keyframes floatCloud {
            0% { transform: translateX(-35vw); }
            100% { transform: translateX(125vw); }
        }
        @keyframes logoIntro {
            0% { transform: scale(4) rotate(-5deg); opacity: 0; filter: blur(4px); }
            40% { opacity: 1; filter: blur(0); }
            85% { transform: scale(1.05) rotate(-5deg); opacity: 1; }
            100% { transform: scale(1) rotate(-5deg); opacity: 1; }
        }
        @keyframes subIntro {
            0% { transform: scale(0); opacity: 0; }
            90% { transform: scale(1.1); opacity: 0.9; }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes zoomOutSky {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.4); opacity: 0; visibility: hidden; }
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-8px) scale(1.05); }
        }
        @keyframes avatarPop {
            0% { transform: scale(1); }
            50% { transform: scale(1.1) rotate(3deg); }
            100% { transform: scale(1); }
        }
        
        /* Nuvens Estilo Desenho Animado */
        .cloud {
            position: fixed; background: #ffffff; border-radius: 100px; pointer-events: none; z-index: 1;
            box-shadow: -4px 6px 0 rgba(0,0,0,0.05); animation: floatCloud 40s linear infinite;
        }
        .cloud::before, .cloud::after { content: ''; position: absolute; background: #ffffff; border-radius: 50%; }
        .cloud::before { width: 75px; height: 75px; top: -35px; left: 20px; }
        .cloud::after { width: 90px; height: 90px; top: -45px; right: 25px; }

        .container { 
            position: relative; z-index: 2; width: 100%; max-width: 600px; margin: 0 auto; 
            padding: 15px; display: flex; flex-direction: column; flex-grow: 1;
        }
        
        /* Intro Tradicional Reformulada */
        .intro-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #5c9ced;
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000;
            overflow: hidden; padding: 20px;
        }
        .intro-overlay.fade-out { animation: zoomOutSky 0.8s forwards ease-in-out; }
        
        .intro-content { 
            text-align: center; 
            width: 100%;
            max-width: 95vw;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        /* Fonte Akbar oficial com contorno duplo e espaçamento corrigido */
        .intro-title { 
            font-family: 'Akbar', 'Comic Sans MS', sans-serif;
            font-size: clamp(2.2rem, 11vw, 5.5rem); 
            color: #ffd000; 
            text-transform: uppercase;
            display: inline-block;
            line-height: 1.1;
            letter-spacing: -1px;
            padding: 10px;
            animation: logoIntro 1.6s cubic-bezier(0.175, 0.885, 0.32, 1.15) forwards;
            text-shadow: 
                -3px -3px 0 #3d2100,  
                 3px -3px 0 #3d2100,
                -3px  3px 0 #3d2100,
                 3px  3px 0 #3d2100,
                 6px  6px 0 rgba(0,0,0,0.2);
        }
        
        .intro-sub { 
            font-family: 'Akbar', 'Comic Sans MS', sans-serif;
            color: #ffffff; 
            font-size: clamp(0.9rem, 4vw, 1.4rem); 
            text-shadow: 2px 2px 0 #3d2100, -1px -1px 0 #3d2100; 
            margin-top: 15px;
            letter-spacing: 1px;
            text-transform: uppercase;
            opacity: 0;
            animation: subIntro 0.6s 1.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        
        /* Estilo Desenho Animado */
        .springfield-header {
            background: #ffd000; border: 4px solid #3d2100; border-radius: 20px; padding: 12px;
            margin-bottom: 15px; box-shadow: 0 6px 0 #3d2100; text-align: center; position: relative;
        }
        .springfield-title { font-size: clamp(1.4rem, 6vw, 2.2rem); color: #fff; text-shadow: 3px 3px 0 #3d2100, -1px -1px 0 #3d2100, 1px -1px 0 #3d2100, -1px 1px 0 #3d2100; font-weight: 900; }
        .springfield-subtitle { color: #3d2100; font-size: 0.85rem; font-weight: bold; margin-top: 5px; }
        
        /* Botão de Controle de Áudio */
        .audio-toggle {
            position: absolute; top: 10px; right: 12px; background: #fff; border: 2px solid #3d2100;
            border-radius: 50%; width: 32px; height: 32px; font-size: 0.9rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 0 #3d2100;
        }
        .audio-toggle:active { transform: translateY(1px); box-shadow: 0 1px 0 #3d2100; }

        /* Painéis */
        .panel { background: #fff; border: 4px solid #3d2100; border-radius: 20px; padding: 15px; box-shadow: 0 6px 0 #3d2100; margin-bottom: 15px; }

        /* Grid de Personagens */
        .characters-grid { 
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 10px; padding: 2px;
        }
        
        .character-card {
            background: #fff; border: 3px solid #3d2100; border-radius: 14px; padding: 6px;
            transition: transform 0.1s ease, box-shadow 0.1s ease; box-shadow: 0 4px 0 #3d2100; cursor: pointer; text-align: center;
            position: relative; display: flex; flex-direction: column; align-items: center; justify-content: space-between;
        }
        .character-card img { width: 100%; aspect-ratio: 1; object-fit: contain; background: #ebf4fa; border-radius: 8px; padding: 3px; border: 2px solid #3d2100; }
        .character-name { font-weight: bold; color: #3d2100; font-size: clamp(9px, 2.5vw, 11px); display: block; margin-top: 4px; line-height: 1.1; }
        
        /* Botões */
        .btn {
            padding: 10px 20px; font-size: 0.95rem; font-weight: bold; border: 3px solid #3d2100; border-radius: 50px;
            cursor: pointer; font-family: inherit; box-shadow: 0 4px 0 #3d2100; transition: all 0.05s ease; margin: 5px; text-transform: uppercase;
        }
        .btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #3d2100; }
        
        .btn-donut { background: #ff69b4; color: white; text-shadow: 2px 2px 0 #3d2100; } 
        .btn-simpson { background: #ffd000; color: #3d2100; } 
        .btn-krusty { background: #4ecdc4; color: white; text-shadow: 2px 2px 0 #3d2100; } 
        .btn-danger { background: #ff4757; color: white; text-shadow: 2px 2px 0 #3d2100; }

        input[type="text"], input[type="password"] {
            padding: 10px 16px; border-radius: 30px; border: 3px solid #3d2100; font-family: inherit;
            font-size: 1rem; margin: 6px auto; width: 90%; max-width: 280px; display: block; box-shadow: inset 0 3px 6px rgba(0,0,0,0.1);
        }
        input:focus { outline: none; background: #fffde6; }
        
        .question-area, .response-area { background: #fff6d1; border: 3px solid #3d2100; border-radius: 16px; padding: 12px; margin: 10px 0; box-shadow: 0 4px 0 #3d2100; }
        .question-area input { display: inline-block; width: 60%; margin: 0 5px 0 0; vertical-align: middle; }
        
        /* Nova Aba de Seleção de Avatares */
        .avatar-selector-scroll { 
            display: flex; gap: 10px; overflow-x: auto; padding: 8px 4px; margin: 10px 0;
            scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch;
        }
        .avatar-option { 
            flex: 0 0 65px; width: 65px; height: 65px; border: 3px solid #3d2100; 
            border-radius: 50%; padding: 4px; background: #fff; cursor: pointer; 
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); scroll-snap-align: center;
        }
        .avatar-option:active { transform: scale(0.9); }
        .avatar-option.selected { background: #ffd000; border-color: #ff69b4; transform: scale(1.1); box-shadow: 0 4px 8px rgba(0,0,0,0.15); animation: avatarPop 0.4s ease; }
        .avatar-option img { width: 100%; height: 100%; object-fit: contain; border-radius: 50%; }

        /* Avatares Principais Redondos */
        .avatar-spin { 
            width: 80px; height: 80px; background: #ffd000; border: 3px solid #3d2100; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; margin: 0 auto 10px; box-shadow: 0 4px 0 #3d2100;
            animation: bounce 2.5s infinite ease-in-out; padding: 6px;
        }
        .avatar-spin img { width: 100%; height: 100%; object-fit: contain; }
        
        .flex-between { display: flex; justify-content: space-between; align-items: center; width: 100%; gap: 5px; }
        .turn-indicator { padding: 6px 14px; border-radius: 50px; font-weight: bold; border: 2px solid #3d2100; box-shadow: 0 3px 0 #3d2100; font-size: 0.8rem; text-align: center; flex-grow: 1; max-width: 160px; }
        .turn-mine { background: #7bed9f; color: #3d2100; animation: avatarPop 1.5s infinite; }
        .turn-opponent { background: #ff6b81; color: white; }
        
        .toast { 
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #3d2100; color: #ffd000; 
            padding: 8px 20px; border-radius: 50px; z-index: 20000; font-weight: bold; font-size: 0.85rem; border: 2px solid #ffd000;
        }

        .room-code-display { font-size: 2rem; font-weight: 900; background: #ff69b4; color: white; border: 3px solid #3d2100; padding: 8px; border-radius: 16px; text-align: center; letter-spacing: 4px; margin: 12px 0; box-shadow: 0 4px 0 #3d2100; text-shadow: 2px 2px 0 #3d2100; }
        .waiting-spinner { width: 35px; height: 35px; border: 5px solid #fff; border-top-color: #ffd000; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 12px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .victory-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(92, 156, 237, 0.98); display: flex; align-items: center; justify-content: center; z-index: 15000; }
        .victory-card { background: #ffd000; border-radius: 24px; padding: 25px 20px; text-align: center; max-width: 340px; width: 92%; border: 5px solid #3d2100; box-shadow: 0 10px 0 #3d2100; }
        .victory-card h2 { font-size: 2.2rem; color: #fff; text-shadow: 3px 3px 0 #3d2100; margin-bottom: 10px; }
        .victory-card p { font-size: 1rem; font-weight: bold; margin-bottom: 15px; }
        .victory-reveal-img { width: 130px; height: 130px; object-fit: contain; background: white; border: 4px solid #3d2100; border-radius: 16px; margin: 10px auto 15px; display: block; box-shadow: 0 5px 0 #3d2100; padding: 5px; }
        
        ::-webkit-scrollbar { height: 6px; width: 6px; }
        ::-webkit-scrollbar-track { background: #fffde6; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #ffd000; border-radius: 10px; border: 1px solid #3d2100; }
    </style>
</head>
<body>

<div id="introScreen" class="intro-overlay">
    <div class="intro-content">
        <h1 class="intro-title">The Simpsons</h1>
        <div class="intro-sub">Cara a Cara • Online</div>
    </div>
</div>

<div id="app" class="container"></div>

<script>
    // ==================== BIBLIOTECA COMPLETA DE PERSONAGENS ====================
    const SIMPSONS = [
        { id: 1, nome: 'Homer Simpson', img: 'https://upload.wikimedia.org/wikipedia/en/0/02/Homer_Simpson_2006.png' },
        { id: 2, nome: 'Marge Simpson', img: 'https://upload.wikimedia.org/wikipedia/en/0/0b/Marge_Simpson.png' },
        { id: 3, nome: 'Bart Simpson', img: 'https://upload.wikimedia.org/wikipedia/en/a/aa/Bart_Simpson_200px.png' },
        { id: 4, nome: 'Lisa Simpson', img: 'https://upload.wikimedia.org/wikipedia/en/e/ec/Lisa_Simpson.png' },
        { id: 5, nome: 'Maggie Simpson', img: 'https://upload.wikimedia.org/wikipedia/en/9/9d/Maggie_Simpson.png' },
        { id: 6, nome: 'Moe Szyslak', img: 'https://upload.wikimedia.org/wikipedia/en/8/80/Moe_Szyslak.png' },
        { id: 7, nome: 'Ned Flanders', img: 'https://upload.wikimedia.org/wikipedia/en/8/84/Ned_Flanders.png' },
        { id: 8, nome: 'Krusty', img: 'https://upload.wikimedia.org/wikipedia/en/5/5a/Krustytheclown.png' },
        { id: 9, nome: 'Mr. Burns', img: 'https://upload.wikimedia.org/wikipedia/en/5/56/Mr_Burns.png' },
        { id: 10, nome: 'Nelson Muntz', img: 'https://upload.wikimedia.org/wikipedia/en/c/c6/Nelson_Muntz.PNG' },
        { id: 11, nome: 'Milhouse', img: 'https://upload.wikimedia.org/wikipedia/en/1/11/Milhouse_Van_Houten.png' },
        { id: 12, nome: 'Apu', img: 'https://upload.wikimedia.org/wikipedia/en/2/23/Apu_Nahasapeemapetilon.png' },
        { id: 13, nome: 'Chefe Wiggum', img: 'https://upload.wikimedia.org/wikipedia/en/e/e4/Clancy_Wiggum.png' },
        { id: 14, nome: 'Diretor Skinner', img: 'https://upload.wikimedia.org/wikipedia/en/2/26/Principal_Skinner.png' },
        { id: 15, nome: 'Ralph Wiggum', img: 'https://upload.wikimedia.org/wikipedia/en/2/2a/Ralph_Wiggum.png' },
        { id: 16, nome: 'Comic Book Guy', img: 'https://upload.wikimedia.org/wikipedia/en/b/ba/Comic_Book_Guy.png' }
    ];

    const firebaseConfig = {
        apiKey: "AIzaSyATdGCu7aiCX-JSCpr2gvsS_GBYSl_cSUs",
        authDomain: "babydoll-38338.firebaseapp.com",
        databaseURL: "https://babydoll-38338-default-rtdb.firebaseio.com",
        projectId: "babydoll-38338",
        storageBucket: "babydoll-38338.firebasestorage.app",
        messagingSenderId: "532837179930",
        appId: "1:532837179930:web:9bca40773fb2304b23e7a3"
    };
    
    let db = null;
    try {
        if (typeof firebase !== 'undefined') {
            firebase.initializeApp(firebaseConfig);
            db = firebase.database();
        }
    } catch(e) { console.log("Firebase Connection Failed", e); }

    let usuarioAtual = null;
    let usuarios = JSON.parse(localStorage.getItem('simpsons_usuarios') || '[]');
    let salaListener = null;
    let meuId = Math.random().toString(36).substring(2, 8);
    let avatarRegistrando = SIMPSONS[0].img; 
    
    // ==================== SINTETIZADOR DE ÁUDIO REAL-TIME ====================
    let audioCtx = null;
    let loopMusicaId = null;
    let mutado = false;

    function initAudioContext() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
    }

    // Toca som retro da intro simulando Simpsons
    function tocarSomIntro() {
        if (mutado) return;
        initAudioContext();
        
        const notas = [261.63, 329.63, 392.00, 493.88, 523.25, 587.33, 659.25, 783.99]; // Notas ascendentes divertidas
        let tempo = audioCtx.currentTime;

        notas.forEach((nota, i) => {
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            
            osc.type = i % 2 === 0 ? 'triangle' : 'square';
            osc.frequency.setValueAtTime(nota, tempo);
            
            gain.gain.setValueAtTime(0.08, tempo);
            gain.gain.exponentialRampToValueAtTime(0.001, tempo + 0.25);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.start(tempo);
            osc.stop(tempo + 0.25);
            
            tempo += 0.15;
        });

        // Inicia a música relaxante em loop logo após a intro acabar
        setTimeout(() => {
            tocarMusicaAmbiente();
        }, 1500);
    }

    // Música de fundo relaxante sintética (Chords de Jazz/Lo-fi contínuos)
    function tocarMusicaAmbiente() {
        if (mutado || loopMusicaId) return;
        initAudioContext();

        let sequencia = 0;
        const progressao = [
            [261.63, 329.63, 392.00, 440.00], // C6
            [349.23, 440.00, 523.25, 587.33], // F6
            [293.66, 349.23, 392.00, 493.88], // G7
            [261.63, 329.63, 392.00, 440.00]  // C6
        ];

        function loop() {
            if (mutado) return;
            let tempo = audioCtx.currentTime;
            let notasAtuais = progressao[sequencia % progressao.length];

            notasAtuais.forEach(nota => {
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();

                osc.type = 'triangle'; // Onda suave e relaxante
                osc.frequency.setValueAtTime(nota / 2, tempo); // Oitava mais baixa para ficar suave

                gain.gain.setValueAtTime(0.04, tempo);
                gain.gain.linearRampToValueAtTime(0.04, tempo + 2.2);
                gain.gain.exponentialRampToValueAtTime(0.001, tempo + 2.5);

                osc.connect(gain);
                gain.connect(audioCtx.destination);

                osc.start(tempo);
                osc.stop(tempo + 2.5);
            });

            sequencia++;
            loopMusicaId = setTimeout(loop, 2500); // Repete a cada 2.5 segundos
        }
        loop();
    }

    function alternarMudo() {
        mutado = !mutado;
        if (mutado) {
            if(loopMusicaId) { clearTimeout(loopMusicaId); loopMusicaId = null; }
        } else {
            tocarMusicaAmbiente();
        }
        document.querySelectorAll('.audio-toggle').forEach(btn => {
            btn.innerText = mutado ? '🔇' : '🔊';
        });
    }

    function toast(msg) { 
        const t=document.createElement('div'); t.className='toast'; t.innerText=msg; 
        document.body.appendChild(t); setTimeout(()=>t.remove(),2000); 
    }
    function salvarUsuarios() { localStorage.setItem('simpsons_usuarios', JSON.stringify(usuarios)); }
    function setUsuario(user) { usuarioAtual = user; localStorage.setItem('simpsons_atual', JSON.stringify(user)); }

    const app = document.getElementById('app');
    
    // Sincronização do Fade Out
    setTimeout(() => { 
        const intro = document.getElementById('introScreen'); 
        if(intro) { intro.classList.add('fade-out'); setTimeout(()=>intro.remove(),800); } 
    }, 3400);

    // Gerador de Nuvens
    for(let i=0; i<8; i++){ 
        const c=document.createElement('div'); c.className='cloud'; 
        c.style.cssText=`width:${130+Math.random()*120}px;height:${45+Math.random()*25}px;top:${2+Math.random()*60}%;left:-180px;animation-delay:${Math.random()*20}s;animation-duration:${28+Math.random()*18}s;`; 
        document.body.appendChild(c); 
    }

    telaPrincipal();

    // ==================== CONTROLE DE TELAS ====================
    function telaPrincipal() {
        app.innerHTML = `
        <div class="screen" style="width:100%">
            <div class="springfield-header">
                <div class="springfield-title">🍩 CARA A CARA 🍩</div>
                <div class="springfield-subtitle">Springfield Multiplayer Edition</div>
                <button class="audio-toggle" id="btnMudo" onclick="alternarMudo()">🔊</button>
            </div>
            <div class="panel" style="text-align:center;">
                <p style="margin-bottom:15px; font-weight:bold;">Adivinhe o personagem secreto do seu oponente!</p>
                <button class="btn btn-donut" id="btnJogar" style="width:90%">🍩 ENTRAR NO JOGO</button>
            </div>
        </div>`;
        document.getElementById('btnJogar')?.addEventListener('click', () => {
            tocarSomIntro(); // Ativa os sintetizadores em tempo real de forma nativa e segura!
            const salvo = localStorage.getItem('simpsons_atual');
            if(salvo) { usuarioAtual = JSON.parse(salvo); telaPerfil(); } else { telaLogin(); }
        });
    }

    function telaLogin() {
        app.innerHTML = `
        <div class="screen">
            <div class="springfield-header">
                <div class="springfield-title"> TAVERNA DO MOE</div>
                <button class="audio-toggle" id="btnMudo" onclick="alternarMudo()">🔊</button>
            </div>
            <div class="panel" style="text-align:center;">
                <div class="avatar-spin"><img src="${SIMPSONS[5].img}"></div>
                <input type="text" id="loginNome" placeholder="Cidadão (Usuário)">
                <input type="password" id="loginSenha" placeholder="Senha">
                <button class="btn btn-simpson" id="btnEntrar" style="width:85%">Entrar</button>
                <button class="btn btn-krusty" id="btnCadastrar" style="width:85%">Criar Nova Conta</button>
            </div>
        </div>`;
        document.getElementById('btnEntrar')?.addEventListener('click', () => {
            const nome = document.getElementById('loginNome').value.trim();
            const senha = document.getElementById('loginSenha').value;
            const user = usuarios.find(u => u.nome.toLowerCase() === nome.toLowerCase() && u.senha === senha);
            if(user) { setUsuario(user); telaPerfil(); } else toast('Acesso negado, cara!');
        });
        document.getElementById('btnCadastrar')?.addEventListener('click', telaRegistro);
    }

    function mudeAvatarRegistro(url, el) {
        avatarRegistrando = url;
        document.querySelectorAll('.avatar-option').forEach(box => box.classList.remove('selected'));
        el.classList.add('selected');
        const prev = document.getElementById('avatarPrevImg');
        if(prev) prev.src = url;
    }

    function telaRegistro() {
        avatarRegistrando = SIMPSONS[0].img;
        let avataresHtml = SIMPSONS.map((p, idx) => `
            <div class="avatar-option ${idx===0?'selected':''}" onclick="mudeAvatarRegistro('${p.img}', this)">
                <img src="${p.img}">
            </div>
        `).join('');

        app.innerHTML = `
        <div class="screen">
            <div class="springfield-header">
                <div class="springfield-title"> REGISTRO</div>
                <button class="audio-toggle" id="btnMudo" onclick="alternarMudo()">🔊</button>
            </div>
            <div class="panel" style="text-align:center;">
                <div id="avatarPrev" class="avatar-spin"><img id="avatarPrevImg" src="${avatarRegistrando}"></div>
                <p style="font-weight:bold; font-size:0.85rem; margin-bottom:2px; color:#3d2100;">Arraste para o lado e mude seu avatar:</p>
                <div class="avatar-selector-scroll">${avataresHtml}</div>
                <input type="text" id="regNome" placeholder="Nome do Personagem">
                <input type="password" id="regSenha" placeholder="Senha Segura">
                <button class="btn btn-krusty" id="btnRegistrar" style="width:85%">Criar Conta</button>
                <button class="btn btn-danger" id="btnVoltarLogin" style="width:85%">Cancelar</button>
            </div>
        </div>`;
        
        document.getElementById('btnRegistrar')?.addEventListener('click', () => {
            const nome = document.getElementById('regNome').value.trim();
            const senha = document.getElementById('regSenha').value;
            if(!nome||!senha) { toast('Preencha os campos!'); return; }
            if(usuarios.find(u=>u.nome.toLowerCase()===nome.toLowerCase())) { toast('Nome indisponível!'); return; }
            
            const novoUsuario = { nome, senha, avatar: avatarRegistrando, pontos: 0 };
            usuarios.push(novoUsuario);
            salvarUsuarios();
            setUsuario(novoUsuario);
            telaPerfil();
        });
        document.getElementById('btnVoltarLogin')?.addEventListener('click', telaLogin);
    }

    function telaEditarPerfil() {
        avatarRegistrando = usuarioAtual.avatar;
        let avataresHtml = SIMPSONS.map((p) => `
            <div class="avatar-option ${p.img === usuarioAtual.avatar ? 'selected' : ''}" onclick="mudeAvatarRegistro('${p.img}', this)">
                <img src="${p.img}">
            </div>
        `).join('');

        app.innerHTML = `
        <div class="screen">
            <div class="springfield-header">
                <div class="springfield-title"> EDITAR PERFIL</div>
                <button class="audio-toggle" id="btnMudo" onclick="alternarMudo()">🔊</button>
            </div>
            <div class="panel" style="text-align:center;">
                <div class="avatar-spin"><img id="avatarPrevImg" src="${avatarRegistrando}"></div>
                <p style="font-weight:bold; font-size:0.85rem; margin-bottom:2px;">Escolha seu novo avatar:</p>
                <div class="avatar-selector-scroll">${avataresHtml}</div>
                <input type="text" id="editNome" value="${usuarioAtual.nome}" placeholder="Nome do Personagem">
                <button class="btn btn-krusty" id="btnSalvarPerfil" style="width:85%">Salvar Alterações</button>
                <button class="btn btn-danger" id="btnCancelarEdit" style="width:85%">Voltar</button>
            </div>
        </div>`;

        document.getElementById('btnSalvarPerfil')?.addEventListener('click', () => {
            const novoNome = document.getElementById('editNome').value.trim();
            if(!novoNome) { toast('O nome não pode ficar vazio!'); return; }
            const nomeExiste = usuarios.find(u => u.nome.toLowerCase() === novoNome.toLowerCase() && u.nome.toLowerCase() !== usuarioAtual.nome.toLowerCase());
            if(nomeExiste) { toast('Este nome já está em uso!'); return; }

            const idx = usuarios.findIndex(u => u.nome === usuarioAtual.nome && u.senha === usuarioAtual.senha);
            if(idx !== -1) {
                usuarios[idx].nome = novoNome;
                usuarios[idx].avatar = avatarRegistrando;
                salvarUsuarios();
                setUsuario(usuarios[idx]);
                toast('Perfil atualizado!');
                telaPerfil();
            }
        });
        document.getElementById('btnCancelarEdit')?.addEventListener('click', telaPerfil);
    }

    function telaPerfil() {
        app.innerHTML = `
        <div class="screen">
            <div class="springfield-header">
                <div class="springfield-title"> SEU PAINEL</div>
                <button class="audio-toggle" id="btnMudo" onclick="alternarMudo()">🔊</button>
            </div>
            <div class="panel" style="text-align:center;">
                <div class="avatar-spin"><img src="${usuarioAtual.avatar}"></div>
                <h2 style="margin-bottom:5px;">${usuarioAtual.nome}</h2>
                <p style="color:#ff69b4; font-weight:bold; font-size:1.1rem; margin-bottom:15px;">⭐ ${usuarioAtual.pontos||0} Rosquinhas Coletadas</p>
                <button class="btn btn-donut" id="btnOnline" style="width:90%">🌍 PROCURAR SALA</button><br>
                <button class="btn btn-simpson" id="btnEditar" style="width:90%"> EDITAR PERFIL</button><br>
                <button class="btn btn-danger" id="btnSair" style="width:90%">Desconectar</button>
            </div>
        </div>`;
        document.getElementById('btnOnline')?.addEventListener('click', () => { if(db) { lobbyOnline(); } else { toast('Firebase Off-line!'); } });
        document.getElementById('btnEditar')?.addEventListener('click', telaEditarPerfil);
        document.getElementById('btnSair')?.addEventListener('click', () => { localStorage.removeItem('simpsons_atual'); telaPrincipal(); });
        if(document.getElementById('btnMudo')) document.getElementById('btnMudo').innerText = mutado ? '🔇' : '🔊';
    }

    function lobbyOnline() {
        app.innerHTML = `
        <div class="screen">
            <div class="springfield-header">
                <div class="springfield-title">☢️ USINA NUCLEAR</div>
                <button class="audio-toggle" id="btnMudo" onclick="alternarMudo()">🔊</button>
            </div>
            <div class="panel" style="text-align:center;">
                <p style="font-weight:bold; margin-bottom:15px;">Crie um novo setor de jogo ou digite o código do oponente!</p>
                <button class="btn btn-donut" id="btnCriarSala" style="width:90%">➕ CRIAR NOVA SALA</button>
                <div style="margin:15px 0; border-top: 2px dashed #3d2100; padding-top:15px;">
                    <input type="text" id="codigoSala" placeholder="CÓDIGO" maxlength="6" style="text-transform:uppercase; text-align:center; font-weight:bold;"><br>
                    <button class="btn btn-krusty" id="btnEntrarSala" style="width:90%">🔗 CONECTAR NA SALA</button>
                </div>
                <button class="btn btn-danger" id="btnVoltarPerfil" style="width:90%">Voltar</button>
            </div>
        </div>`;
        document.getElementById('btnCriarSala')?.addEventListener('click', () => {
            const codigo = Math.random().toString(36).substring(2,8).toUpperCase();
            const aleatorio = SIMPSONS[Math.floor(Math.random() * SIMPSONS.length)];
            db.ref(`salas/${codigo}`).set({
                codigo, criador: usuarioAtual.nome, criadorId: meuId, criadorSecreto: aleatorio.id,
                convidado: null, convidadoId: null, convidadoSecreto: null,
                disponiveisCriador: SIMPSONS.map(c=>c.id), disponiveisConvidado: SIMPSONS.map(c=>c.id),
                vez: 'criador', status: 'espera', vencedor: null, perguntaAtual: null, respostaAtual: null, historico: ["Sala Inicializada com Sucesso!"]
            });
            iniciarJogo(codigo, true);
        });
        document.getElementById('btnEntrarSala')?.addEventListener('click', () => { const cod=document.getElementById('codigoSala').value.trim().toUpperCase(); if(cod) entrarSala(cod); else toast('Insira um código!'); });
        document.getElementById('btnVoltarPerfil')?.addEventListener('click', () => telaPerfil());
        if(document.getElementById('btnMudo')) document.getElementById('btnMudo').innerText = mutado ? '🔇' : '🔊';
    }

    function entrarSala(codigo) {
        db.ref(`salas/${codigo}`).once('value', (snapshot) => {
            const sala = snapshot.val();
            if(!snapshot.exists()) { toast('Sala não encontrada!'); return; }
            if(sala.convidado && sala.convidadoId !== meuId) { toast('Sala cheia!'); return; }
            
            const aleatorio = SIMPSONS[Math.floor(Math.random() * SIMPSONS.length)];
            let hist = sala.historico || [];
            if(sala.convidadoId !== meuId) {
                hist.push(`${usuarioAtual.nome} entrou no jogo.`);
                db.ref(`salas/${codigo}`).update({ 
                    convidado: usuarioAtual.nome, convidadoId: meuId, convidadoSecreto: aleatorio.id, status: 'jogando', historico: hist
                });
            }
            iniciarJogo(codigo, false);
        });
    }

    function iniciarJogo(codigo, souCriador) {
        if(salaListener) salaListener.off();
        salaListener = db.ref(`salas/${codigo}`);
        salaListener.on('value', (snapshot) => {
            const sala = snapshot.val();
            if(!sala) { if(salaListener) salaListener.off(); telaPerfil(); return; }
            if(souCriador && !sala.convidado) {
                app.innerHTML = `
                <div class="screen">
                    <div class="springfield-header">
                        <div class="springfield-title">⏳ ESPERANDO OPONENTE</div>
                        <button class="audio-toggle" id="btnMudo" onclick="alternarMudo()">🔊</button>
                    </div>
                    <div class="panel" style="text-align:center;">
                        <div class="waiting-spinner"></div>
                        <p style="font-weight:bold; margin-bottom:10px;">Compartilhe este código com o seu amigo:</p>
                        <div class="room-code-display">${codigo}</div>
                        <button class="btn btn-danger" id="btnCancelar" style="width:90%">Fechar Sala</button>
                    </div>
                </div>`;
                document.getElementById('btnCancelar')?.addEventListener('click', () => { if(salaListener) salaListener.off(); db.ref(`salas/${codigo}`).remove(); telaPerfil(); });
                if(document.getElementById('btnMudo')) document.getElementById('btnMudo').innerText = mutado ? '🔇' : '🔊';
                return;
            }
            if(sala.vencedor) {
                const segredoOponenteId = souCriador ? sala.convidadoSecreto : sala.criadorSecreto;
                const oponenteObj = SIMPSONS.find(p => p.id === segredoOponenteId);
                mostrarVitoria(sala.vencedor === usuarioAtual.nome, sala.vencedor, oponenteObj, codigo, souCriador);
                return;
            }
            renderizarJogo(sala, souCriador);
        });
    }

    function tentarNovamente(codigo, souCriador) {
        const novoSecretoCriador = SIMPSONS[Math.floor(Math.random() * SIMPSONS.length)].id;
        const novoSecretoConvidado = SIMPSONS[Math.floor(Math.random() * SIMPSONS.length)].id;
        
        db.ref(`salas/${codigo}`).update({
            vencedor: null, perguntaAtual: null, respostaAtual: null, vez: 'criador', status: 'jogando',
            criadorSecreto: novoSecretoCriador, convidadoSecreto: novoSecretoConvidado,
            disponiveisCriador: SIMPSONS.map(c => c.id), disponiveisConvidado: SIMPSONS.map(c => c.id),
            historico: [" Uma nova partida foi iniciada na mesma sala!"]
        }).then(() => { iniciarJogo(codigo, souCriador); });
    }

    function mostrarVitoria(ganhei, nomeVencedor, personagemOponente, codigo, souCriador) {
        if(ganhei && !window.pontoContabilizado) {
            usuarioAtual.pontos = (usuarioAtual.pontos || 0) + 1;
            const idx = usuarios.findIndex(u => u.nome === usuarioAtual.nome);
            if(idx !== -1) { usuarios[idx].pontos = usuarioAtual.pontos; salvarUsuarios(); setUsuario(usuarioAtual); }
            window.pontoContabilizado = true;
        }

        app.innerHTML = `
        <div class="victory-overlay">
            <div class="victory-card">
                <h2>${ganhei ? 'YEE-HAW!' : 'OUCH!'}</h2>
                <p>${ganhei ? 'Excelente! Você descobriu o segredo!' : `O espertinho do ${nomeVencedor} ganhou!`}</p>
                <p style="font-size:0.9rem; color:#3d2100; margin-bottom:5px;">O Personagem Real era:</p>
                <img class="victory-reveal-img" src="${personagemOponente ? personagemOponente.img : ''}">
                <div style="font-weight:900; margin-bottom:15px;">${personagemOponente ? personagemOponente.nome : 'Desconhecido'}</div>
                
                <button class="btn btn-krusty" id="btnTenteNovamente" style="width:90%"> TENTE NOVAMENTE</button>
                <button class="btn btn-donut" id="btnVoltarLobby" style="width:90%">Voltar ao Menu</button>
            </div>
        </div>`;

        document.getElementById('btnTenteNovamente')?.addEventListener('click', () => { window.pontoContabilizado = false; tentarNovamente(codigo, souCriador); });
        document.getElementById('btnVoltarLobby')?.addEventListener('click', () => { window.pontoContabilizado = false; if(salaListener) salaListener.off(); telaPerfil(); });
    }

    function renderizarJogo(sala, souCriador) {
        const oponente = souCriador ? sala.convidado : sala.criador;
        const minhaVez = (souCriador && sala.vez === 'criador') || (!souCriador && sala.vez === 'convidado');
        const meusIdsDisponiveis = souCriador ? (sala.disponiveisCriador || []) : (sala.disponiveisConvidado || []);
        const meuSegredoId = souCriador ? sala.criadorSecreto : sala.convidadoSecreto;
        const meuPersonagemObjeto = SIMPSONS.find(p => p.id === meuSegredoId);

        let gridHtml = '';
        for(const p of SIMPSONS) {
            const estaAtivo = meusIdsDisponiveis.includes(p.id);
            gridHtml += `
            <div class="character-card" id="card-${p.id}" style="${estaAtivo ? '' : 'opacity: 0.4; background: #e0e0e0; border-color: #777;'}" onclick="alternarCarta(${p.id}, ${souCriador}, '${sala.codigo}')">
                <img src="${p.img}">
                <span class="character-name">${p.nome}</span>
            </div>`;
        }

        let topoPainelHtml = `
            <div class="flex-between" style="margin-bottom:10px;">
                <div style="text-align:left;">
                    <span style="font-size:0.75rem; display:block; font-weight:bold;">VOCÊ É:</span>
                    <strong style="color:#ff69b4; font-size:0.95rem;">${meuPersonagemObjeto ? meuPersonagemObjeto.nome : '???'}</strong>
                </div>
                <div class="turn-indicator ${minhaVez ? 'turn-mine' : 'turn-opponent'}">
                    ${minhaVez ? 'SUA VEZ' : 'VEZ DO OPONENTE'}
                </div>
            </div>`;

        app.innerHTML = `
        <div class="screen" style="width:100%">
            <div class="springfield-header" style="padding: 8px 12px; margin-bottom: 10px;">
                <div class="springfield-title" style="font-size:1.4rem;">PARTIDA ONLINE</div>
                <div class="springfield-subtitle">Oponente: ${oponente || 'Esperando...'} | Código: ${sala.codigo}</div>
                <button class="audio-toggle" id="btnMudo" onclick="alternarMudo()">🔊</button>
            </div>
            
            <div class="panel" style="padding:10px; margin-bottom:10px;">
                ${topoPainelHtml}
                <div class="characters-grid">${gridHtml}</div>
            </div>
        </div>`;
        if(document.getElementById('btnMudo')) document.getElementById('btnMudo').innerText = mutado ? '🔇' : '🔊';
    }
</script>
</body>
</html>
